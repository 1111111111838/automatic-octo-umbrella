name: Ultimate Downloader

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'קישור להורדה'
        required: true
      dynamic_cookies:
        description: 'עוגיות מהתוסף'
        required: false

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Cookies
        run: |
          if [ -n "${{ github.event.inputs.dynamic_cookies }}" ]; then
            echo "${{ github.event.inputs.dynamic_cookies }}" | base64 --decode > cookies.txt
            echo "✅ העוגיות נטענו."
          else
            touch cookies.txt
          fi

      - name: Execute Download
        run: |
          # הפקודה הבאה משתמשת ב-J- (שומר שם מקורי) וב-O (מוריד לפי השם שהשרת נותן)
          curl -L -k -b cookies.txt \
               -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
               -H "Referer: https://chat.google.com/" \
               -O -J \
               "${{ github.event.inputs.file_url }}"

          # זיהוי שם הקובץ שנוצר בפועל (כדי שנדע מה להעלות ל-Artifacts)
          # אנחנו מחפשים קובץ שהוא לא cookies.txt ולא ה-blank.yml
          FILENAME=$(ls -1 --ignore=cookies.txt --ignore='*.yml' | head -n 1)
          echo "DOWNLOADED_NAME=$FILENAME" >> $GITHUB_ENV
          echo "Detected filename: $FILENAME"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-file
          path: ${{ env.DOWNLOADED_NAME }}
          retention-days: 1
