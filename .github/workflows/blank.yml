# .github/workflows/blank.yml
on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'קישור ישיר להורדת הקובץ'
        required: true
      dynamic_cookies:
        description: 'עוגיות מהתוסף (Base64)'
        required: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  download_file:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Cookies
        run: |
          # אם הגיעו עוגיות מהתוסף בפורמט Base64, נפענח אותן לקובץ cookies.txt [cite: 1001, 1002]
          if [ -n "${{ github.event.inputs.dynamic_cookies }}" ]; then
            echo "${{ github.event.inputs.dynamic_cookies }}" | base64 --decode > cookies.txt
            echo "Using dynamic cookies from extension." [cite: 1002, 1109]
          elif [ -n "${{ secrets.YOUTUBE_COOKIES }}" ]; then
            echo "${{ secrets.YOUTUBE_COOKIES }}" > cookies.txt
            echo "Using static cookies from Secrets." [cite: 1111]
          else
            echo "No cookies provided, downloading publicly." [cite: 1004]
            touch cookies.txt
          fi

      - name: Download Process
        run: |
          # הורדת הקובץ באמצעות wget עם תמיכה בעוגיות שנוצרו [cite: 1010]
          # הקובץ יישמר בשם זמני כדי למנוע בעיות תווים [cite: 1010]
          wget --load-cookies cookies.txt "${{ github.event.inputs.file_url }}" -O output_file

      - name: Verify and Upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: universal-download
          path: output_file
          [cite_start]retention-days: 1 [cite: 1117]
