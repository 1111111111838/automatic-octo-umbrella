name: Universal Downloader

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'קישור ישיר להורדה'
        required: true
      dynamic_cookies:
        description: 'עוגיות מהתוסף'
        required: false

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Cookies
        run: |
          if [ -n "${{ github.event.inputs.dynamic_cookies }}" ]; then
            echo "${{ github.event.inputs.dynamic_cookies }}" | base64 --decode > cookies.txt
            echo "Cookies loaded successfully."
          else
            touch cookies.txt
          fi

      - name: Run Wget
        run: |
          # שימוש ב-wget להורדה גנרית
          wget --load-cookies cookies.txt "${{ github.event.inputs.file_url }}" -O output_file

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-file
          path: output_file
