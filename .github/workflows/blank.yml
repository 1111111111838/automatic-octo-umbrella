name: Universal Downloader

on:
  workflow_dispatch:
    inputs:
      file_url:
        description: 'קישור להורדה'
        required: true
      dynamic_cookies:
        description: 'עוגיות'
        required: false

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Cookies
        run: |
          if [ -n "${{ github.event.inputs.dynamic_cookies }}" ]; then
            echo "${{ github.event.inputs.dynamic_cookies }}" | base64 --decode > cookies.txt
          else
            touch cookies.txt
          fi

      - name: Advanced Download
        run: |
          # שימוש ב-curl כי הוא טוב יותר מ-wget בטיפול ב-Headers מורכבים
          curl -L -k -b cookies.txt \
               -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
               -H "Referer: https://chat.google.com/" \
               -H "Origin: https://chat.google.com" \
               "${{ github.event.inputs.file_url }}" \
               -o output_file

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: google-chat-file
          path: output_file
